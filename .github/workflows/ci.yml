name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'

  pack:
    needs: build-and-test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Pack site extension
        run: dotnet pack src/TempTrimmer/TempTrimmer.csproj --configuration Release --no-restore --output nupkg

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: nupkg/*.nupkg

  publish-nuget:
    needs: pack
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget-publish

    # id-token: write is required for NuGet trusted publishing (OIDC — no API key secret needed).
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v8
        with:
          name: nupkg
          path: nupkg

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: alasdaircs

      - name: Publish to NuGet.org
        shell: bash
        run: dotnet nuget push nupkg/*.nupkg --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
