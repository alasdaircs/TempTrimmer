name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'

  pack:
    needs: build-and-test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Pack site extension
        run: dotnet pack src/TempTrimmer/TempTrimmer.csproj --configuration Release --no-restore --output nupkg

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.nupkg

  publish-nuget:
    needs: pack
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget-publish

    # id-token: write is required for NuGet trusted publishing (OIDC — no API key secret needed).
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: nupkg

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Get NuGet OIDC token
        id: nuget-token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Publish to NuGet.org
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ steps.nuget-token.outputs.token }} --source https://api.nuget.org/v3/index.json --skip-duplicate
